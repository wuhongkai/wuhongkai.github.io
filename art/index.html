<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品集</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="homepage" id="homepage">
        <div class="hero">
            <h1 class="hero-title" id="heroTitle"></h1>
            <p class="hero-subtitle" id="heroSubtitle"></p>
            <p class="hero-contact" id="heroContact"></p>
            <button class="showreel-btn" id="showreelBtn">作品概览</button>
        </div>
        <div class="categories" id="categories"></div>
    </div>

    <div class="category-page" id="categoryPage" style="display:none;">
        <button class="back-btn" onclick="goBack()">< back</button>
        <h2 class="page-title" id="pageTitle"></h2>
        <div class="works-grid" id="worksGrid"></div>
    </div>

    <div class="modal" id="videoModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <iframe id="videoFrame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
